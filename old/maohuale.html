<t>
	k := <c>p<sup>2</sup> + p + 1
</t>
<t>
	[1]:
	<c>p &in; &primes; &wedge; p &gt; 3</c>
	&Implies;
	<c>
	j &NotVerticalBar; 3<sup>p</sup> - 1</c>
</t>

<t>
	j &lt; (p+1)<sup>2</sup>
</t>



<t>
	j is prime &Implies; <t>
	  <t>
			&exist; k &in; F(j) such that 3 &lt; k &lt; p
		</t>
		
		<t>
			3<sup>p</sup> &equiv;<sub>k</sub> 1
		</t>

		<t>
			3<sup>k &minus; 1</sup> &equiv;<sub>k</sub> 1
		</t>

		<t>
			k &minus; 1 &equiv;<sub>p</sub> 0
		</t>
  </t>
</t>

<t>
	<t>
		j &notin; &primes; &Implies;<t>
			???
		</t>
	</t>
	&Implies;
	j &in; &primes;
